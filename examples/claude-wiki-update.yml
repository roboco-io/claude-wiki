# Scheduled wiki refresh via Claude Wiki.
# Copy into .github/workflows/claude-wiki-update.yml.
#
# Requires the CLAUDE_CODE_OAUTH_TOKEN secret — generate one locally with
# `claude setup-token` (works with a Claude Pro/Max subscription).

name: Claude Wiki Update

on:
  schedule:
    - cron: "0 0 * * 1" # weekly, Monday 00:00 UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update-wiki:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Claude Code and Claude Wiki
        run: npm install -g @anthropic-ai/claude-code claude-wiki

      - name: Update wiki
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: claude-wiki update

      - name: Create pull request
        uses: peter-evans/create-pull-request@v7
        with:
          title: "docs: refresh Claude Wiki"
          commit-message: "docs: refresh Claude Wiki"
          branch: claude-wiki/update
