# Scheduled wiki refresh via AgentWiki.
# Copy into .github/workflows/agentwiki-update.yml.
#
# Requires the CLAUDE_CODE_OAUTH_TOKEN secret — generate one locally with
# `claude setup-token` (works with a Claude Pro/Max subscription).

name: AgentWiki Update

on:
  schedule:
    - cron: "0 0 * * 1" # weekly, Monday 00:00 UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update-wiki:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Claude Code and AgentWiki
        run: npm install -g @anthropic-ai/claude-code agentwiki

      - name: Update wiki
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: agentwiki update

      - name: Create pull request
        uses: peter-evans/create-pull-request@v7
        with:
          title: "docs: refresh AgentWiki"
          commit-message: "docs: refresh AgentWiki"
          branch: agentwiki/update
